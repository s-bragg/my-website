<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>BRAEGGER</title>

  <style>
    body {
      margin: 0;
      background-color: #222222;
      color: white;
      font-family: Consolas, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      margin-top: 120px;
      text-align: center;
    }

    .title {
      font-size: 64px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .red {
      color: #ff3b3b;
    }

    .section {
      margin-top: 100px;
      display: flex;
      align-items: center;
      gap: 40px;
      max-width: 900px;
    }

    .image {
      width: 200px;
      height: 200px;
      background-color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #777;
      font-size: 14px;
    }

    .text {
      flex: 1;
      font-size: 16px;
      color: #e6e6e6;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      font-family: Consolas, monospace;
      background-color: transparent;
      border: 1px solid #555;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      border-color: #ff3b3b;
      color: #ff3b3b;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">

    <!-- BRAEGGER: 2. G ist rot -->
    <div class="title">
      BRAEG<span class="red">G</span>ER
    </div>

    <!-- Korrekturservices: 2. r ist rot -->
    <div class="subtitle">
      Schreib- und Kor<span class="red">r</span>ekturservices
    </div>

  </div>

  <!-- SECTION -->
  <div class="section">

    <img src="Bild-1.jpg" alt="Bild 1" style="width:200px; height:200px; object-fit:cover;">

    <div class="text">
      blabla
    </div>

    <div class="buttons">
      <button>Angebot</button>
      <button>Kontakt</button>
    </div>

  </div>

</body>
</html>
