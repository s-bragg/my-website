<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRÄGGER</title>

  <style>
    body {
      margin: 0;
      background-color: #303030;
      color: #e6e6e6;
      font-family: Consolas, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
.header {
  margin-top: 120px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  text-align: left;     /* Titel + Untertitel linksbündig */
  position: relative;
}

    .title {
      font-size: 60px;
      font-weight: bold;
      letter-spacing: 22px;
    }

    .subtitle {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .red {
      color: #ff3b3b;
    }

    .section {
  margin-top: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 100%;
}

       .tagline {
  display: block;
  text-align: center;
  margin-top: 45px;

  color: #4da6ff;
  font-weight: bold;
  font-size: 20px;
  font-family: "Ink Free", cursive;

  transform: rotate(-20deg);
}
    
    .buttons {
      display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
    }

    button {
      padding: 16px 40px;
  font-family: Consolas, monospace;
  background-color: transparent;
  border: 2px solid #555;
  color: #e6e6e6;
  cursor: pointer;
  transition: 0.2s;
  font-size: 18px;
  width: 220px;
    }

    button:hover {
      border-color: #4da6ff;
      color: #4da6ff;
    }

    @media (max-width: 600px) {

 .header {
  margin-top: 60px;
  padding: 0 20px;
  box-sizing: border-box;
}

  .title {
    font-size: 38px;
    letter-spacing: 27px;
  }

  .subtitle {
    font-size: 18px;
  }

  .tagline {
    font-size: 16px;
    margin-top: 25px;
    transform: rotate(-15deg);
  }

  button {
    width: 180px;
    font-size: 16px;
  }

}
    
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    
    <!-- BRÄGGER: 2. G ist rot -->
    <div class="title">
      BRÄG<span class="red">G</span>ER
    </div>

    <!-- Korrekturservices: 2. r ist rot -->
    <div class="subtitle">
      Schreib- und Kor<span class="red">r</span>ekturservices
    </div>

  </div>

  <div class="tagline">
  diskret + zuverlässig
  </div>

  <!-- SECTION -->
  <div class="section">

    <div class="buttons">
      <button onclick="location.href='aktuell.html'">Aktuell</button>
      <button onclick="location.href='angebot.html'">Angebot</button>
      <button onclick="location.href='about.html'">About</button>
      <button onclick="location.href='kontakt.html'">Kontakt</button>
    </div>
    
  </div>

<!-- FOOTER -->
  <footer style="margin-top:100px; padding:20px; color:#888; font-size:12px; text-align:center;">
    © 2026 BRÄGGER Schreib- und Korrekturservices
  </footer>

</body>
</html>
