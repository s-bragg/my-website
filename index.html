<!DOCTYPE html>

<head>

  <style>
    body {
      margin: 0;
      background-color: #303030;
      color: #e6e6e6;
      font-family: Consolas, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
.header {
  margin-top: 120px;
  text-align: center;
  position: relative;
}

    .title {
      font-size: 64px;
      font-weight: bold;
      letter-spacing: 16px;
    }

    .subtitle {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .tagline {
  position: absolute;
  right: -70px;   /* nach rechts rausziehen */
  top: 120px;       /* unter dem Subtitle */

  color: #4da6ff;
  font-weight: bold;
  font-size: 20px;
  font-family: "Bradley Hand ITC", cursive;
      
  transform: rotate(-30deg);
  display: inline-block;
    }

    .red {
      color: #ff3b3b;
    }

    .section {
        margin-top: 100px;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
    }

    .image {
      width: 200px;
      height: 200px;
      background-color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #777;
      font-size: 14px;
    }

   .text {
  flex: 1;
  font-size: 16px;
  color: #e6e6e6;

  max-width: 600px;
  min-width: 0;

  text-align: justify;

  white-space: normal;
  overflow-wrap: break-word;
  word-break: normal;
  }

    .buttons {
      display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
    }

    button {
      padding: 16px 40px;
  font-family: Consolas, monospace;
  background-color: transparent;
  border: 1px solid #555;
  color: #e6e6e6;
  cursor: pointer;
  transition: 0.2s;
  font-size: 18px;
  width: 220px;
    }

    button:hover {
      border-color: #4da6ff;
      color: #4da6ff;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header-box">

    <!-- Korrekturservices: 2. r ist rot -->

      Schreib- und Kor<span class="red">r</span>ekturservices

    <div class="tagline">
  diskret + zuverlässig
  </div>

  </div>

  <!-- SECTION -->
  <div class="section">

    <div class="buttons">
      <button onclick="location.href='angebot.html'">Angebot</button>

<!-- FOOTER -->
  <footer style="margin-top:100px; padding:20px; color:#888; font-size:12px; text-align:center;">
